server.port=${SERVER_PORT:8000}

# ─── PostgreSQL (same DB as Prisma / Node.js BFF) ─────────────────────────────
spring.datasource.url=${JAVA_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://<NEON_HOST>/<NEON_DB>?sslmode=require}}
spring.datasource.username=${DB_USER:<NEON_USER>}
spring.datasource.password=${DB_PASSWORD:<NEON_PASSWORD>}
spring.datasource.driver-class-name=org.postgresql.Driver

# Prisma owns shared tables; Flyway manages Spring Boot-specific tables
spring.jpa.hibernate.ddl-auto=none
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Redis (cache + pub/sub for realtime) ──────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6399}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=${CACHE_TYPE:redis}

# ─── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET_KEY:oceanbazar-secret-key-change-in-production}

# ─── App Settings ──────────────────────────────────────────────────────────────
app.seed=${APP_SEED:true}
app.balance-featured-sales-half=false
app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8000}
app.upload-dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:4000,http://127.0.0.1:4000}

# ─── Admin / Inventory ────────────────────────────────────────────────────────
oceanbazar.admin.low-stock-threshold=10
security.rate-limit.login.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:20}
security.rate-limit.login.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}

# ─── File Uploads ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ─── Cloudinary ───────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dmtafp1fi}
cloudinary.api-key=${CLOUDINARY_API_KEY:487252925521551}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:_rHB9A85bxjgZqzcNZb0ja9vBk8}

# ─── Payment provider placeholders ────────────────────────────────────────────
bkash.api-key=${BKASH_API_KEY:}
bkash.app-secret=${BKASH_APP_SECRET:}
nagad.api-key=${NAGAD_API_KEY:}
nagad.app-secret=${NAGAD_API_KEY:}
sslcommerz.store-id=${SSLCOMMERZ_STORE_ID:}
sslcommerz.store-password=${SSLCOMMERZ_STORE_PASSWORD:}

# ─── WebSocket ─────────────────────────────────────────────────────────────────
oceanbazar.websocket.allow-all-origins=${WEBSOCKET_ALLOW_ALL_ORIGINS:true}
oceanbazar.websocket.allowed-origin-patterns=${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*}
oceanbazar.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000,http://localhost:4000,http://127.0.0.1:4000}
oceanbazar.websocket.stomp.max-connect-per-minute-per-token=${STOMP_MAX_CONNECT_PER_MIN:25}
oceanbazar.websocket.stomp.max-subscribe-per-minute-per-session=${STOMP_MAX_SUBSCRIBE_PER_MIN:60}
oceanbazar.websocket.stomp.max-send-per-minute-per-session=${STOMP_MAX_SEND_PER_MIN:180}

# ─── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=oceanbazar-backend

# ─── Inventory / Seller ───────────────────────────────────────────────────────
oceanbazar.inventory.reservation-ttl-minutes=${INVENTORY_RESERVATION_TTL:30}
oceanbazar.inventory.low-stock-threshold=${INVENTORY_LOW_STOCK_THRESHOLD:10}
oceanbazar.seller.default-commission-rate=${SELLER_DEFAULT_COMMISSION:5.0}
oceanbazar.seller.auto-approve=${SELLER_AUTO_APPROVE:false}

spring.task.scheduling.pool.size=4
