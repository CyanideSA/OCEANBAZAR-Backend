databases:
  - name: oceanbazar-postgres
    databaseName: oceanbazar
    user: oceanbazar
    plan: basic-256mb

services:
  - type: redis
    name: oceanbazar-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: oceanbazar-java-api
    env: docker
    repo: https://github.com/CyanideSA/OCEANBAZAR-Backend
    rootDir: backend-java
    plan: starter
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: DATABASE_URL
        value: jdbc:postgresql://<RENDER_PG_HOST>:5432/oceanbazar
      - key: DB_USER
        value: oceanbazar
      - key: DB_PASSWORD
        value: <RENDER_PG_PASSWORD>
      - key: REDIS_HOST
        value: <RENDER_REDIS_HOST>
      - key: REDIS_PORT
        value: <RENDER_REDIS_PORT>
      - key: REDIS_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://oceanbazar-java-api.onrender.com
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: CORS_ALLOWED_ORIGINS
        value: https://<storefront-vercel-domain>,https://<admin-render-domain>
      - key: WEBSOCKET_ALLOWED_ORIGINS
        value: https://<storefront-vercel-domain>,https://<admin-render-domain>
      - key: WEBSOCKET_ALLOWED_ORIGIN_PATTERNS
        value: https://*.vercel.app,https://*.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: oceanbazar-bff
    env: node
    repo: https://github.com/CyanideSA/OCEANBAZAR-Backend
    rootDir: backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://<storefront-vercel-domain>
      - key: ADMIN_URL
        value: https://<admin-render-domain>
      - key: JAVA_API_URL
        value: https://oceanbazar-java-api.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: OTP_EXPIRE_MINUTES
        value: 10
      - key: OTP_TERMINAL_ONLY
        value: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: PUBLIC_BASE_URL
        value: https://oceanbazar-bff.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_PROJECT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: Oceanbazar <noreply@oceanbazar.com>

  - type: web
    env: static
    name: oceanbazar-admin-crm
    repo: https://github.com/CyanideSA/OCEANBAZAR-Frontend-Admin
    rootDir: admin-frontend-react
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_ADMIN_API_URL
        value: https://oceanbazar-bff.onrender.com
      - key: VITE_WS_URL
        value: https://oceanbazar-java-api.onrender.com
